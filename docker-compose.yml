services:
  mysql:
    image: mysql:8.4
    container_name: employee-management-mysql
    environment:
      MYSQL_DATABASE: employee_management_system
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: employee-management-api
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_URL: jdbc:mysql://mysql:3306/employee_management_system
      DB_USERNAME: root
      DB_PASSWORD: root
    ports:
      - "${APP_PORT:-8080}:8080"

volumes:
  mysql-data:
